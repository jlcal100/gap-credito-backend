async function saveUsuario(id){
  if(!throttleOp())return;
  const nom=$('usrNom').value.trim();
  const ap=$('usrAp').value.trim();
  const email=$('usrEmail').value.trim().toLowerCase();
  const tipo=$('usrTipo').value;

  if(tipo==='superadmin'&&CU.tipo!=='superadmin'){toast('Solo un Super Admin puede crear otro Super Admin','err');return}

  const estId=tipo==='operador'?$('usrEst').value:null;
  if(!nom||!email){toast('Nombre y email son requeridos','err');return}
  if(tipo==='operador'&&!estId){toast('Seleccione una estacion para el operador','err');return}

  try{
    let permisos=null;
    if(tipo==='admin'){
      permisos={};
      PERMISOS_DEF.forEach(p=>{
        const cb=$('perm_'+p.key);
        permisos[p.key]=cb?cb.checked:false;
      });
    }

    const data={
      nombre:nom,
      ap,
      email,
      tipo:tipo.toUpperCase(),
      estacionId:estId,
      rfc:$('usrRfc').value.trim(),
      tel:$('usrTel').value.trim(),
      permisos
    };

    if(id){
      const act=$('usrActivo');if(act)data.activo=act.value==='1';
      const np=$('usrNewPass');
      if(np&&np.value){
        const err=validatePw(np.value);
        if(err){toast(err,'err');return}
        data.password=np.value;
      }
      await api('/api/usuarios/'+id,{method:'PUT',body:JSON.stringify(data)});
    } else {
      const pw=$('usrPass').value;
      const err=validatePw(pw);
      if(err){toast(err,'err');return}
      data.password=pw;
      data.activo=true;
      await api('/api/usuarios',{method:'POST',body:JSON.stringify(data)});
    }
    await loadFromAPI();
    closeModal('modalUsuario');
    toast(id?'Usuario actualizado':'Usuario registrado');
    rUsuarios();
  }catch(e){
    toast('Error: '+e.message,'err');
  }
}

  q=q.toLowerCase();

function exportAudit(){
  const logs=D.audit||[];

  logs.forEach(l=>{csv+=fDateFull(l.ts)+','+l.tipo+',"'+esc(l.userName)+'","'+esc(l.desc)+'"\n'});

}

/* ========== CSV IMPORT ========== */
function parseMontoCSV(raw){
  if(!raw)return 0;
  let s=String(raw).trim();
  const neg=s.includes('-');
  s=s.replace(/[$,\s\-]/g,'');
  let v=Math.round(parseFloat(s||'0')*100);
  if(neg)v=-v;
  return v;
}

let pendingCSVData=[];

function previewCSV(input){
  const file=input.files[0];
  if(!file)return;
  if(!file.name.endsWith('.csv')){toast('Solo se aceptan archivos CSV','err');return}
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    pendingCSVData=[];
    // Buscar header
    let startIdx=0;
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes('NOMBRE')&&lines[i].toUpperCase().includes('SALDO')){startIdx=i+1;break}
      if(lines[i].toUpperCase().includes('CLIENTE')){startIdx=i+1;break}
    }
    if(startIdx===0)startIdx=1; // skip first line as header
    for(let i=startIdx;i<lines.length;i++){
      const line=lines[i].trim();
      if(!line)continue;
      // Parse CSV considering quoted fields
      const parts=[];
      let current='',inQuotes=false;
      for(let c=0;c<line.length;c++){
        if(line[c]==='"'){inQuotes=!inQuotes}
        else if(line[c]===','&&!inQuotes){parts.push(current.trim());current=''}
        else{current+=line[c]}
      }
      parts.push(current.trim());
      const nombre=parts[0]||'';
      const saldoRaw=parts[1]||'0';
      if(!nombre)continue;
      const saldo=parseMontoCSV(saldoRaw);
      pendingCSVData.push({nombre,saldo,saldoRaw});
    }
    // Show preview
    let h='<p style="font-size:12px;font-weight:700;margin-bottom:8px">Vista previa: '+pendingCSVData.length+' clientes encontrados</p>';
    h+='<div style="max-height:300px;overflow-y:auto"><table class="data-table"><tr><th>Cliente</th><th>Saldo</th></tr>';
    pendingCSVData.forEach(r=>{
      const color=r.saldo>0?'var(--error)':r.saldo<0?'var(--success)':'var(--text-sec)';
      h+='<tr><td>'+esc(r.nombre)+'</td><td class="monto" style="color:'+color+'">'+(r.saldo<0?'-':'')+fmt(Math.abs(r.saldo))+'</td></tr>';
    });
    h+='</table></div>';
    $('csvPreview').innerHTML=h;
    $('csvActions').style.display='block';
  };
  reader.readAsText(file);
}

async function executeCSVImport(){
  if(pendingCSVData.length===0){toast('No hay datos para importar','err');return}
  const estId=CU.tipo==='operador'?CU.estacionId:selEst;
  if(!estId){toast('Seleccione estacion','err');return}

  try{
    let importados=0;
    for(const r of pendingCSVData){
      const existing=D.clientes.find(c=>c.estacionId===estId&&c.razonSocial.trim().toUpperCase()===r.nombre.trim().toUpperCase());
      if(existing)continue;

      const tipoCliente=BANCOS_TRANSITO.includes(r.nombre)?'transito':'cliente';
      const cliData={razonSocial:r.nombre,rfc:'',domicilioFiscal:'',representanteLegal:'',telefono:'',email:'',tipoCliente,estacionId:estId,notas:'Importado por CSV'};
      const cliResp=await api('/api/clientes',{method:'POST',body:JSON.stringify(cliData)});
      const cliId=cliResp.id;

      const saldoAbs=Math.abs(r.saldo);
      const lineaCredito=saldoAbs>0?Math.max(saldoAbs*3,5000000):5000000;
      const ctrData={clienteId:cliId,lineaCredito,fechaInicio:new Date(Date.now()-90*86400000).toISOString(),fechaVencimiento:new Date(Date.now()+270*86400000).toISOString(),fianzaMonto:0,fianzaTipo:'NINGUNA',condicionesPago:30,tasaMoratoria:2.5,docContrato:'',docPagare:'',docFianza:'',estacionId:estId,status:'VIGENTE'};
      const ctrResp=await api('/api/contratos',{method:'POST',body:JSON.stringify(ctrData)});
      const ctrId=ctrResp.id;

      if(r.saldo>0){
        const consData={clienteId:cliId,contratoId:ctrId,monto:r.saldo,descripcion:'Saldo inicial importado',numFactura:'SALDO-INI',fechaConsumo:new Date().toISOString(),estacionId:estId,status:'PENDIENTE'};
        await api('/api/consumos',{method:'POST',body:JSON.stringify(consData)});
      }
      if(r.saldo<0){
        const pagData={clienteId:cliId,contratoId:ctrId,monto:Math.abs(r.saldo),metodo:'SALDO_INICIAL',refBancaria:'SALDO-FAV',fechaDeposito:new Date().toISOString(),estacionId:estId,status:'CONFIRMADO',nota:'Saldo a favor importado'};
        await api('/api/pagos',{method:'POST',body:JSON.stringify(pagData)});
      }
      importados++;
    }
    await loadFromAPI();
    closeModal('modalCliente');
    toast(importados+' clientes importados exitosamente');
    pendingCSVData=[];
    rClientes();
  }catch(e){
    toast('Error en importacion: '+e.message,'err');
  }
}
